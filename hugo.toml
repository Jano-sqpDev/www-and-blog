soibaseURL = "https://sqpdev.com/"
languageCode = "en-gb"
title = "SQP Dev"
theme = "sqpdev"

[params]
  description = "Infrastructure as Code"
  author = "SQP Dev"
  logo = "/images/logo.png"
  about = "From rendering pipelines to deployment pipelines — turns out I just really like pipelines. After years in VFX and IT, I'm teaching myself DevOps and documenting every triumph, stumble, and suspicious YAML error along the way."
  contact_email = ""

  [[params.services]]
    icon = "⚙️"
    title = "IaaC Solutions"
    desc = "Terraform, Ansible, and Pulumi — infrastructure defined, versioned, and automated."

  [[params.services]]
    icon = "☁️"
    title = "Cloud Architecture"
    desc = "AWS, Azure, and GCP environments designed for reliability and cost efficiency."

  [[params.services]]
    icon = "🔄"
    title = "CI/CD Pipelines"
    desc = "Automated build, test, and deployment workflows that ship with confidence."

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
